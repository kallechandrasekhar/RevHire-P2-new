services:
  mysql:
    image: mysql:8.0
    container_name: revhire-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: revhire
      MYSQL_USER: revhire
      MYSQL_PASSWORD: revhire
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - revhire-network

  backend:
    build: ./Rev-Hire
    container_name: revhire-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/revhire?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - revhire-network

  frontend:
    build: ./Rev-Hire-Frontend
    container_name: revhire-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - revhire-network

volumes:
  mysql_data:

networks:
  revhire-network:
    driver: bridge