name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH (Turbo Method)
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Prepare directory
            mkdir -p ~/RevHire-P2-new
            cd ~/RevHire-P2-new
            
            # 2. Download latest code directly from GitHub as ZIP (Much faster than SCP)
            echo "Downloading latest code..."
            curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                 https://github.com/${{ github.repository }}/archive/refs/heads/main.zip -o repo.zip
            
            # 3. Unzip and move files
            echo "Extracting code..."
            unzip -q -o repo.zip
            cp -rf RevHire-P2-new-main/* .
            rm -rf RevHire-P2-new-main repo.zip

            # 4. Detect OS and install Docker if missing
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              if command -v apt-get &> /dev/null; then
                sudo apt-get update -y && sudo apt-get install -y docker.io docker-buildx-plugin
              elif command -v dnf &> /dev/null; then
                sudo dnf install -y docker docker-compose-plugin
              fi
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER || true
            fi

            # 5. Handle Docker Compose command (v1 vs v2)
            if docker compose version &> /dev/null; then
              COMPOSE_CMD="docker compose"
            else
              COMPOSE_CMD="docker-compose"
            fi

            # 6. Build and Start
            echo "Starting containers..."
            sudo $COMPOSE_CMD down || true
            sudo $COMPOSE_CMD up -d --build