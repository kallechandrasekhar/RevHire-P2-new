name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Copy repository contents via scp
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".,!node_modules,!target,!.git"
          target: "~/RevHire-P2-new"
          
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/RevHire-P2-new
            
            # Detect OS and install Docker + Compose + Buildx
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              if command -v apt-get &> /dev/null; then
                sudo apt-get update -y
                sudo apt-get install -y docker.io docker-buildx-plugin
              elif command -v dnf &> /dev/null; then
                sudo dnf install -y docker docker-compose-plugin
              elif command -v yum &> /dev/null; then
                sudo yum install -y docker
                sudo yum install -y docker-compose-plugin
              fi
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER || true
            fi

            # Double check for buildx support which is required for Compose V2 builds
            if ! docker buildx version &> /dev/null; then
              echo "Installing Buildx plugin..."
              if command -v apt-get &> /dev/null; then
                sudo apt-get install -y docker-buildx-plugin
              fi
            fi

            # Ensure the latest compose plugin is available (handles v2)
            # If not found, fall back to downloading binary
            if ! docker compose version &> /dev/null; then
              echo "Downloading Docker Compose binary..."
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              # Alias it for consistency
              sudo ln -s /usr/local/bin/docker-compose /usr/bin/docker-compose 2>/dev/null || true
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_CMD="docker compose"
            fi

            # Shut down existing containers
            sudo $COMPOSE_CMD down || true
            
            # Start up new containers
            sudo $COMPOSE_CMD up -d --build